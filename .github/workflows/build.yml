name: Build Frontend
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and Build
        run: |
          cd frontend
          npm install
          npm run build
      - name: Upload Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: frontend/build/
